<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PokeAPI</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family: Inter, Arial, sans-serif;
text-align:center;
background: radial-gradient(circle at top, #1f2937 0%, #0f172a 45%, #020617 100%);
color:#e2e8f0;
min-height:100vh;
}

h1{
margin:32px 0 18px;
font-size:2.2rem;
letter-spacing:0.8px;
color:#f8fafc;
}

input{
width:260px;
padding:10px 12px;
border:1px solid #334155;
border-radius:10px;
background:#0f172a;
color:#e2e8f0;
outline:none;
}

input::placeholder{
color:#94a3b8;
}

button{
margin-left:8px;
padding:10px 16px;
border:1px solid #334155;
border-radius:10px;
background:#2563eb;
color:#eff6ff;
cursor:pointer;
font-weight:600;
transition:transform .15s ease, background .2s ease;
}

button:hover{
background:#1d4ed8;
transform:translateY(-1px);
}

#pokemonList{
max-width:1200px;
margin:22px auto 30px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
gap:16px;
padding:0 20px;
}

.pokemon{
background:#0b1220;
border:1px solid #1e293b;
padding:14px;
border-radius:14px;
box-shadow:0 8px 24px rgba(0,0,0,.35);
transition:transform .2s ease, border-color .2s ease;
}

.pokemon:hover{
transform:translateY(-3px);
border-color:#334155;
}

.pokemon h3{
margin:0 0 10px;
text-transform:capitalize;
color:#f1f5f9;
}

.pokemon p{
min-height:42px;
margin:10px 0 0;
font-size:.9rem;
color:#cbd5e1;
}

.locked{
filter: grayscale(100%);
opacity:0.55;
}

img{
width:100px;
height:100px;
object-fit:contain;
}

</style>

</head>

<body>

<h1>PokeAPI</h1>

<input id="searchInput" placeholder="Buscar pokemon">
<button id="searchBtn">Buscar</button>

<div id="pokemonList"></div>

<script type="module" src="/src/main.ts"></script>

</body>
</html>
